<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — SoftandPix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .offline-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 3rem 2rem;
            text-align: center;
            max-width: 480px;
            width: 90%;
            backdrop-filter: blur(10px);
        }
        .offline-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            display: block;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.95); }
        }
        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-retry {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: #fff;
            padding: 0.75rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            margin-top: 1.5rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-retry:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="offline-card">
        <span class="offline-icon">📡</span>
        <div class="brand">SoftandPix</div>
        <h2 class="h4 mb-3">You're Offline</h2>
        <p class="text-white-50">
            It looks like you've lost your internet connection.<br>
            Please check your network and try again.
        </p>
        <button class="btn-retry" onclick="window.location.reload()">
            🔄 &nbsp;Retry Connection
        </button>
        <p class="mt-4 text-white-50 small">
            Some content may still be available from your cached version.
        </p>
    </div>
    <script>
        window.addEventListener('online', function() {
            window.location.reload();
        });
    </script>
</body>
</html>
